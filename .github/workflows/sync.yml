name: Sync Dropbox to R2

on:
  schedule:
    - cron: "*/10 * * * *"   # ~every 10 min (GitHub cron min ~5 min; may be delayed)
  workflow_dispatch: {}        # manual "Run workflow" for instant sync

concurrency:
  group: dropbox-r2-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
    steps:
      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Write rclone config
        # Pass the secret via env (not direct ${{ }} interpolation) so the
        # double-quotes inside the Dropbox token JSON are preserved verbatim.
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

      - name: Sync Dropbox -> R2
        # `copy` is additive (never deletes) — adds and updates only. Deletions
        # are handled by the dedicated, guarded "Prune" step below so a bad
        # Dropbox listing can never mass-wipe the bucket the way a raw
        # `rclone sync` mirror could.
        run: |
          rclone copy "dropbox:Gavin Howell/Dance/BTSB-WEBSITE-GALLERY" "r2:gavin-media" \
            --fast-list --transfers=8 --checkers=16 --retries=3 -v

      - name: Prune media deleted from Dropbox
        # Mirror deletions safely: remove from R2 only user MEDIA (images/videos)
        # that no longer exist in Dropbox, so deleting a file in Dropbox removes
        # it from the gallery. Guarantees:
        #  - Admin data is never touched: only image/video extensions are ever
        #    deleted, so content.json / links.json / members.json / album.json
        #    (all .json) are inherently safe.
        #  - A video's poster (same-name image for a video still in Dropbox) is
        #    kept, even though the poster itself may live only in R2.
        #  - Orphaned auto-thumbnails are removed once their video is gone.
        #  - Safety guards: abort if the Dropbox listing is empty, and refuse to
        #    delete more than MAX_PRUNE files in one run.
        env:
          MAX_PRUNE: "200"
        run: |
          set -euo pipefail
          SRC="dropbox:Gavin Howell/Dance/BTSB-WEBSITE-GALLERY"
          DST="r2:gavin-media"

          rclone lsf "$SRC" --recursive --files-only | sort > /tmp/dropbox.txt
          rclone lsf "$DST" --recursive --files-only | sort > /tmp/r2.txt

          # Safety: never prune from an empty/failed source listing.
          if [ ! -s /tmp/dropbox.txt ]; then
            echo "Dropbox listing is empty — skipping prune (safety guard)."
            exit 0
          fi

          # Full-path stems of videos still present in Dropbox (poster owners).
          grep -iE '\.(mp4|mov|webm|m4v)$' /tmp/dropbox.txt \
            | sed -E 's/\.[^.\/]+$//' | sort -u > /tmp/live_video_stems.txt || true

          # R2 keys that are absent from Dropbox.
          comm -23 /tmp/r2.txt /tmp/dropbox.txt > /tmp/r2_only.txt || true

          : > /tmp/to_delete.txt
          while IFS= read -r key; do
            [ -z "$key" ] && continue
            base="${key##*/}"
            lower="$(printf '%s' "$base" | tr '[:upper:]' '[:lower:]')"
            case "$lower" in
              *.mp4|*.mov|*.webm|*.m4v)
                echo "$key" >> /tmp/to_delete.txt ;;
              *.jpg|*.jpeg|*.png|*.webp|*.gif|*.avif)
                # Keep an image whose stem matches a video still in Dropbox
                # (it is that video's poster); otherwise it was deleted.
                stem="${key%.*}"
                if grep -Fxq "$stem" /tmp/live_video_stems.txt; then
                  echo "keep (poster for live video): $key"
                else
                  echo "$key" >> /tmp/to_delete.txt
                fi ;;
              *)
                : ;; # non-media (album.json, site/*, etc.) — never pruned
            esac
          done < /tmp/r2_only.txt

          count=$(wc -l < /tmp/to_delete.txt | tr -d ' ')
          echo "Prune candidates: $count"
          if [ "$count" -gt "$MAX_PRUNE" ]; then
            echo "Refusing to delete $count files (> MAX_PRUNE=$MAX_PRUNE)."
            echo "If this is intentional, raise MAX_PRUNE and re-run."
            exit 1
          fi
          while IFS= read -r key; do
            [ -z "$key" ] && continue
            echo "deleting: $key"
            rclone deletefile "$DST/$key" --s3-no-check-bucket || echo "delete failed: $key"
          done < /tmp/to_delete.txt

      - name: Auto-generate video thumbnails
        # For every video missing a same-name thumbnail image, grab a
        # representative frame with ffmpeg and upload it as <video-stem>.jpg.
        # The gallery already uses a same-name image as the video poster (and
        # hides it from the grid). Manual thumbnails are never overwritten.
        env:
          MEDIA_BASE: "https://media.breakthestageboy.com"
        run: |
          command -v ffmpeg >/dev/null || { sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg; }
          rclone lsf r2:gavin-media --recursive --files-only > /tmp/all.txt || true
          grep -iE '\.(mp4|mov|webm|m4v)$' /tmp/all.txt > /tmp/vids.txt || true
          while IFS= read -r vid; do
            [ -z "$vid" ] && continue
            stem="${vid%.*}"
            has_thumb=0
            for ext in jpg jpeg png webp gif avif JPG JPEG PNG WEBP; do
              if grep -Fxq "$stem.$ext" /tmp/all.txt; then has_thumb=1; break; fi
            done
            [ "$has_thumb" = "1" ] && { echo "skip (has thumbnail): $vid"; continue; }
            enc=$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))' "$vid")
            echo "generating thumbnail: $vid"
            # -nostdin: ffmpeg must NOT read stdin, or it consumes the loop's
            # input list and mangles the remaining filenames.
            if ffmpeg -nostdin -hide_banner -loglevel error -ss 1 -i "$MEDIA_BASE/$enc" \
                 -frames:v 1 -vf "thumbnail,scale='min(1280,iw)':-2" -q:v 3 -y /tmp/thumb.jpg </dev/null; then
              # --s3-no-check-bucket: scoped R2 token can't create/inspect buckets.
              rclone copyto /tmp/thumb.jpg "r2:gavin-media/$stem.jpg" --s3-no-check-bucket \
                || echo "upload failed: $stem.jpg"
            else
              echo "ffmpeg failed (skipping): $vid"
            fi
          done < /tmp/vids.txt

      # Optional instant refresh: purge the Worker JSON cache so new media shows
      # up immediately instead of waiting for the 5-min TTL. Requires the
      # CF_API_TOKEN and CF_ZONE_ID secrets; skipped automatically if unset.
      - name: Purge Cloudflare cache (optional)
        if: ${{ env.CF_ZONE_ID != '' }}
        run: |
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' || echo "cache purge failed (non-fatal)"
